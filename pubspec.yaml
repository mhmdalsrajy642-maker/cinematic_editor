name: cinematic_editor
description: A revolutionary mobile video editing application
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.3.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  # إدارة الحالة
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  get_it: ^7.7.0
  # قاعدة البيانات المحلية
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  # معالجة الفيديو والصوت
  video_player: ^2.9.1
  just_audio: ^0.9.40
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  # الذكاء الاصطناعي المحلي
  tflite_flutter: ^0.10.4
  # الشبكة والـ API
  dio: ^5.4.3
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  web_socket_channel: ^2.4.0
  # الواجهة والتصميم
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  # الأدوات المساعدة
  uuid: ^4.4.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.2
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  # التخزين والأمان
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  crypto: ^3.0.3
  # المدفوعات
  in_app_purchase: ^3.2.0
  purchases_flutter: ^8.0.0
  # الإشعارات والتحليلات
  firebase_core: ^3.3.0
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  # ربط الكود الأصلي C++
  ffi: ^2.1.3
  # مؤشرات التقدم والتعديلات على الصور
  photo_view: ^0.15.0
  syncfusion_flutter_sliders: ^26.1.38
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/animations/
  fonts: []
